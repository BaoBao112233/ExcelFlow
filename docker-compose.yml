version: '3.8'

services:
  # Backend API - FastAPI with Vertex AI
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: excelflow-backend
    ports:
      - "8002:8000"
    environment:
      # AI Provider Configuration - Vertex AI with Gemini 2.5 Flash
      - AI_PROVIDER=vertex
      - AI_MODEL=gemini-2.0-flash-exp
      - AI_TEMPERATURE=0.7
      - AI_MAX_TOKENS=4096
      
      # Vertex AI Configuration
      - VERTEX_PROJECT_ID=${VERTEX_PROJECT_ID:-kfactory-prod}
      - VERTEX_LOCATION=${VERTEX_LOCATION:-us-central1}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/credentials/service-account.json
      
      # Python environment
      - PYTHONUNBUFFERED=1
    volumes:
      # Mount service account file (READ-ONLY for security)
      - ./service-account.json:/app/credentials/service-account.json:ro
      # Mount app code for development (comment out in production)
      - ./backend/app:/app/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - excelflow-network

  # Frontend - React + Vite with Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: excelflow-frontend
    ports:
      - "8003:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - excelflow-network

networks:
  excelflow-network:
    driver: bridge

# Volume for persistent data (optional)
